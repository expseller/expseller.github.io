<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap Empire</title>

    <link rel="stylesheet" href="style.css">

    <script type="module" src="main.js" defer></script>
</head>

<body>

<div id="loading">
    <h1>🏛️ Tap Empire</h1>
    <p>Lade Spiel...</p>
</div>

<div id="menu" class="hidden">

    <h1>🏛️ Tap Empire</h1>

    <button id="playBtn">
        ▶ Neues Spiel
    </button>

    <button id="continueBtn">
        💾 Fortsetzen
    </button>

    <button id="settingsBtn">
        ⚙ Einstellungen
    </button>

</div>

<div id="game" class="hidden">

<header>

<h2>🏛️ Tap Empire</h2>

<div id="money">
$0
</div>

</header>

<main>

<div id="city">

<h1>🏙️</h1>

</div>

<button id="tapButton">
💰 TAP
</button>

</main>

<footer>

<button id="shopBtn">
🏪 Shop
</button>

<button id="workersBtn">
👷 Arbeiter
</button>

<button id="prestigeBtn">
👑 Prestige
</button>

</footer>

</div>

</body>
</html>
